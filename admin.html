<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>관리자 통계</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="school-title">제주중앙고등학교(2026학년도 연구학교 지정)</p>
        <p class="badge">관리자 전용</p>
        <h1>설문 통계 대시보드</h1>
        <p class="subtext">비밀번호 입력 후 통계를 확인할 수 있습니다.</p>
      </header>

      <section id="loginSection" class="card">
        <h2>로그인</h2>
        <div class="login-row">
          <input id="passwordInput" type="password" placeholder="비밀번호 입력" />
          <button id="loginButton" class="primary" type="button">입장</button>
        </div>
        <p id="loginMessage" class="subtext"></p>
      </section>

      <section id="dashboardSection" class="card hidden">
        <div class="stats-head">
          <h2>통계</h2>
          <button id="clearAllButton" class="danger" type="button">전체 통계 초기화</button>
        </div>
        <div id="statsContent"></div>
      </section>
    </main>

    <script src="data.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
